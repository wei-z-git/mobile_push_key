name: Docker Image CI

on:
  push:
    branches: [ main ]
    tags: ["*"]

jobs:

  Daily-build:
    if: github.ref == 'refs/heads/main'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag registry.cn-qingdao.aliyuncs.com/wei-z/mobile_push_key:latest

    - name: Login to ACR
      uses: aliyun/acr-login@v1
      with:
        login-server: https://registry.cn-qingdao.aliyuncs.com
        username: "${{ secrets.ACR_USERNAME }}"
        password: "${{ secrets.ACR_PASSWORD }}"
        
    - name: Push image
      run: |
        docker push registry.cn-qingdao.aliyuncs.com/wei-z/mobile_push_key:latest

    - name: smoke testing
      run: |
        docker run -d -p 81:80 registry.cn-qingdao.aliyuncs.com/wei-z/mobile_push_key:latest
        sleep 5
        curl localhost:81
        
  
  Release-build:
    if: github.ref_type == 'tag'

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3
    - name: Build the Docker image
      run: |
        docker build . --file Dockerfile --tag registry.cn-qingdao.aliyuncs.com/wei-z/mobile_push_key:${{ github.ref_name }}

    - name: Login to ACR
      uses: aliyun/acr-login@v1
      with:
        login-server: https://registry.cn-qingdao.aliyuncs.com
        username: "${{ secrets.ACR_USERNAME }}"
        password: "${{ secrets.ACR_PASSWORD }}"
        
    - name: Push image
      run: |
        docker push registry.cn-qingdao.aliyuncs.com/wei-z/mobile_push_key:${{ github.ref_name }}
